services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: access_guardian_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  playwright:
    build: ./playwright-service
    env_file:
      - .env
    volumes:
      - playwright_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    ports:
      - "6000:6000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/access_guardian_prod
      SECRET_KEY_BASE: "generate-a-real-secret-with-mix-phx-gen-secret-at-least-64-bytes-long-here"
      PHX_HOST: accessguardian.josboxoffice.com
      PHX_SERVER: "true"
      PORT: "6000"
      PLAYWRIGHT_SERVICE_URL: "http://playwright:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  playwright_data:
